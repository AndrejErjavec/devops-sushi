apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-api
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sushi-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sushi-api
    spec:
      containers:
        - name: sushi-api
          image: ghcr.io/andrejerjavec/sushi-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CPU_WORK_MS
              value: "35"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-api
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-api
spec:
  selector:
    app.kubernetes.io/name: sushi-api
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 8000
      targetPort: http
  type: ClusterIP
