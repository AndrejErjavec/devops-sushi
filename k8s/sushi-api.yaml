apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-api
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sushi-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sushi-api
    spec:
      containers:
        - name: sushi-api
          image: ghcr.io/andrejerjavec/sushi-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: CPU_WORK_MS
              value: "35"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-api
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sushi-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sushi-api
  namespace: sushi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sushi-api
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
