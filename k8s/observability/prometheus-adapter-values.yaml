prometheus:
  url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local
  port: 9090

rules:
  custom:
    # Pretvori http_requests_total v metrico "http_requests_per_second"
    # HPA jo bere kot: koliko requestov/s gre na vsak pod
    - seriesQuery: 'sushi_api_http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: "^sushi_api_http_requests_total$"
        as: "http_requests_per_second"
      metricsQuery: |
        sum(rate(sushi_api_http_requests_total{<<.LabelMatchers>>,path!="/healthz",path!="/metrics"}[2m])) by (<<.GroupBy>>)
