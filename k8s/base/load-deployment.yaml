apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-load-generator
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sushi-load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sushi-load-generator
    spec:
      containers:
        - name: load-generator
          image: ghcr.io/your-org/devops-sushi-load:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TARGET_URL
              value: "http://sushi-api.sushi.svc.cluster.local"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-load-generator
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-load-generator
spec:
  selector:
    app.kubernetes.io/name: sushi-load-generator
  ports:
    - name: http
      port: 8080
      targetPort: http
