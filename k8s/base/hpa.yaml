apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sushi-api
  namespace: sushi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sushi-api
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
