apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-api
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sushi-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sushi-api
    spec:
      containers:
        - name: sushi-api
          image: sushi-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CPU_WORK_MS
              value: "35"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
