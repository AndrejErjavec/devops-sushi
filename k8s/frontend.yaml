apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-frontend
  namespace: sushi
  labels:
    app.kubernetes.io/name: sushi-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sushi-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sushi-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/andrejerjavec/sushi-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-frontend
  namespace: sushi
spec:
  selector:
    app.kubernetes.io/name: sushi-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
