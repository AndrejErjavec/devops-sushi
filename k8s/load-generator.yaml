apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-load-generator
  namespace: sushi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sushi-load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sushi-load-generator
    spec:
      containers:
        - name: load-generator
          image: ghcr.io/andrejerjavec/sushi-load-generator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TARGET_URL
              value: "http://sushi-api.sushi.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-load-generator
  namespace: sushi
spec:
  selector:
    app.kubernetes.io/name: sushi-load-generator
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
