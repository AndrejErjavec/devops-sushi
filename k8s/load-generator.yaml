apiVersion: apps/v1
kind: Deployment
metadata:
  name: sushi-load-generator
  namespace: sushi
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sushi-load-generator
  template:
    metadata:
      labels:
        app: sushi-load-generator
    spec:
      containers:
        - name: load-generator
          image: sushi-load:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 8080
          env:
            - name: TARGET_URL
              value: "http://sushi-api.sushi.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sushi-load-generator
  namespace: sushi
spec:
  selector:
    app: sushi-load-generator
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
