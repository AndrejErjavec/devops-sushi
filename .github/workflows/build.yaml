name: Build and push sushi-api

on:
  push:
    branches:
      - main
    # paths:
    # - app/sushi_api/**
    # - app/load_generator/**

env:
  IMAGE_API: ghcr.io/andrejerjavec/sushi-api
  IMAGE_LOAD: ghcr.io/andrejerjavec/sushi-load-generator
  IMAGE_FRONTEND: ghcr.io/andrejerjavec/sushi-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN_GHCR }}

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: app/sushi_api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build and push load generator
        uses: docker/build-push-action@v5
        with:
          context: app/load_generator
          push: true
          tags: |
            ${{ env.IMAGE_LOAD }}:latest
            ${{ env.IMAGE_LOAD }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: app/frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
